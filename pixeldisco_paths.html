<!DOCTYPE html>
<!-- www.386dx25.de 2023 -->
<html lang="en">
<head><meta charset="utf-8"/>
<title>Hypnotoads pixel disco (along paths)</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="author" content="386dx25, mnemonic@386dx25.de"/>
<style>
body {
  text-align: center;
}
canvas { 
  image-rendering: crisp-edges;
  image-rendering: pixelated;
  width: 100%;
  max-width: 512px;
}
</style>
</head>
<body>
<h1>Hypnotoads pixel disco (along paths)</h1>
<p>by <a href="https://www.386dx25.de">386dx25.de</a>, edit in <a href="https://jsfiddle.net/386dx25/2xr40hcm/231/">jsfiddle</a></p>
<script type="text/javascript">

const querystring = new URLSearchParams(document.location.search.substring(1));

// Canvas square size also determines path length
var size = querystring.get("size") ? parseInt(querystring.get("size")) : 128;
const width = size;
const height = size;

// -- Kernel --

const defaultKernel = [
  0, 1, 0,
  1, 0, 1,
  0, 1, 0
];
const kernelRadius = 1; // floored half-width of (square) kernel

function parseKernel(s) {
  let k = s.split('').map((ch) => ch == '0' ? .0 : 1.);
  return (k.length == (kernelRadius*2+1)*(kernelRadius*2+1)) ? k : null;
}

const kernel = (querystring.get("kernel") ? parseKernel(querystring.get("kernel")) : defaultKernel) || defaultKernel;

var kernelMagic = querystring.get("magic") ? parseInt(querystring.get("magic")) : 1111;  // the _magic_ number

// -- Path --

function makeScanlinePath() {
  const r = kernelRadius;
  let path = new Int32Array((width - 2 * r) * (height - 2 * r));
  let i = 0;
  for (let y = r; y < height - r; y++) {
    for (let x = r; x < width - r; x++, i++) {
      path[i] = y * width + x;
    }
  }
  return path;
}

function makeDiamondPath() {
  let path = [];
  const m = height / 2;
  for (let y = 0; y < height; y++) {
    let [xl, xr] = (y < m) ? [m - y, m + y + 1] : [y - m, 3 * m - y];
    for (let x = xl; x < xr; x++) {
      path.push(y * width + x);
    }
  }
  return path;
}

function makeSpiralPath() {
  const w = width; // assume square matrix of even size
  let path = new Int32Array(w * w); // linear indices of path through matrix

  path[0] = (w / 2) + (w / 2) * w; // center

  const step = [1, w, -1, -w]; // right, down, left, up

  let dir = 0; // direction
  let m = 1; // step-size
  let i = 1; // position on path
  for (; m < w; m++) {
    const last_edge = m >= w - 1;
    for (let edge = 0; edge < (last_edge ? 1 : 2); edge++) {
      for (let pixel = 0; pixel < (last_edge ? (w - 1) : m); pixel++) {
        path[i] = path[i - 1] + step[dir];
        i = i + 1;
      }
      dir = (dir + 1) % 4;
    }
  }
  return path;
}

function makeDiscPath() {
  let path = [];
  let r = Math.min(width, height) / 2;
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      if ((x - width / 2) * (x - width / 2) + (y - height / 2) * (y - height / 2) < r * r) {
        path.push(y * width + x);
      }
    }
  }
  return path;
}

const pattern = querystring.get("pattern") || 'diamond';
const path = (pattern === 'scanline') ? makeScanlinePath() : (pattern === 'disc') ? makeDiscPath() : (pattern === 'diamond') ? makeDiamondPath() : makeSpiralPath();

// -- Canvas & draw code --

var clear = false;

var canvas = document.createElement('canvas');
canvas.id = "pixeldisco";
canvas.width = width;
canvas.height = height;
canvas.addEventListener("mousedown", (e) => { clear = true; }, false);
canvas.addEventListener('wheel', (e) => { if(e.buttons == 4) kernelMagic = 1111; else kernelMagic += Math.sign(e.deltaY); }, false);
document.body.appendChild(canvas);

const ctx = canvas.getContext('2d', { willReadFrequently: true });

function draw() {
  const imageData = ctx.getImageData(0, 0, width, height);
  var pixels = new Uint32Array(imageData.data.buffer); // efficient view

  let grayValueToRGBA = (value) => (255 << 24) | (value << 16) | (value << 8) | value;

  if(clear) {
    clear = false;
    pixels.fill(grayValueToRGBA(255));
  }
  else {    
    // Convolve with kernel "in-place"

    const r = kernelRadius;
    const stride = width * 4;
    const weight = kernel.reduce((acc, a) => acc + a, 0.0);

    for (let i = 0; i < path.length; i++) {
      let value = 0;
      let ki = 0;
      const pathPixelIndex = path[i];
      for (let row = 0; row < 2 * r + 1; ++row) {
        for (let col = 0; col < 2 * r + 1; ++col) {
          let pixelIndex = pathPixelIndex + (row - r) * width + (col - r);
          let red = pixels[pixelIndex] & 255;
          value += red * kernel[ki++];
        }
      }

      value = ((value + kernelMagic) / weight) % 256;
      
      pixels[pathPixelIndex] = grayValueToRGBA(value);
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

// -- Main loop --

function update() {
  // http://codetheory.in/controlling-the-frame-rate-with-requestanimationframe/
  const fps = 25.0;
  setTimeout(function() {
    window.requestAnimationFrame(update);
    draw();
  }, 1000 / fps);
}

window.requestAnimationFrame(update);
</script>
</body>
</html>
